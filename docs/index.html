<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WattPulse</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #1d1d1f;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f7;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 { color: #007aff; font-size: 32px; margin-bottom: 8px; }
        .tagline { color: #6e6e73; font-size: 18px; margin-bottom: 32px; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 320px;
            margin: 0 auto;
        }
        .links a {
            display: block;
            padding: 14px 24px;
            background: #f5f5f7;
            color: #007aff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #e8e8ed;
        }
        .footer { text-align: center; color: #6e6e73; font-size: 13px; margin-top: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">⚡</div>
    <h1>WattPulse</h1>
    <p class="tagline">See your home's energy heartbeat</p>

    <div class="links">
        <a href="support.html">Support & FAQ</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
    </div>
</div>

<div class="footer">
    © 2026 WattPulse. All rights reserved.
</div>
</body>
</html>
